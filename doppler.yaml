# Monorepo Doppler mapping.
# We intentionally pin projects here but not configs:
# local dev config names vary by user (`dev_<name>`), while many scripts pass
# `--config` explicitly. This file exists to document and set project scope.
setup:
  - project: os
    path: ./
  - project: ingress-proxy
    path: apps/ingress-proxy/
  - project: example
    path: apps/example/
  - project: example
    path: apps/example-v2/
  - project: example
    path: apps/fetch-test/
  - project: events
    path: apps/events/
  - project: semaphore
    path: apps/semaphore/
  - project: test
    path: apps/test/
