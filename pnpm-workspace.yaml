packages:
  - apps/cf-ingress-proxy-worker
  - apps/semaphore
  - apps/semaphore-contract
  - apps/project-ingress-proxy
  - apps/cli
  - apps/daemon
  - apps/iterate-com
  - apps/os
  - apps/auth
  - apps/auth-contract
  - apps/auth-example
  - jonasland
  - apps/ingress-proxy-worker
  - apps/ingress-proxy-contract
  - apps/example
  - apps/daemon-v2
  - apps/example-contract
  - apps/daemon-v2-contract
  - apps/events
  - apps/events-contract
  - sandbox
  - jonasland/sandbox
  - jonasland/e2e
  - services/*
  - '!services/events'
  - '!services/events-contract'
  - packages/*
  - packages/pidnap/docker
  - repo-templates/**/*
  - .github/ts-workflows
  - experiments/*

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - drizzle-kit
  - miniflare
  - wrangler
  - "@cloudflare/unenv-preset"
  - alchemy
  - "@cloudflare/sandbox"
  - workerd
  - "@mmkal/jsonata"
  - "@mmkal/json-schema-to-typescript"
  - "@mariozechner/pi-ai"
  - "@mariozechner/pi-coding-agent"
  - "@mariozechner/pi-agent-core"
  - "@mariozechner/pi-tui"
  - pidnap
  - schematch
  - trpc-cli
  - hono
  - "@hono/node-server"
  - "@hono/node-ws"

onlyBuiltDependencies:
  - "@tailwindcss/oxide"
  - better-sqlite3
  - esbuild
  - lightningcss
  - node-pty
  - sharp
  - workerd
  - bun

patchedDependencies:
  "@better-auth/drizzle-adapter": "patches/@better-auth__drizzle-adapter.patch"

overrides:
  # x402,viem are optional peer dependencies of agents sdk, which is source of lot of unnecessary/deprecated packages, removing them is fine
  "agents>x402": "-"
  "agents>viem": "-"
  "quicktype-core>readable-stream": "npm:vite-compatible-readable-stream@3.6.1"
  "better-sqlite3": "npm:libsql@0.5.22"
