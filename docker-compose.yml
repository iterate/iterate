# Local development docker-compose
#
# Usage: pnpm docker:up  (handles worktrees automatically)
#    or: ./scripts/docker-compose-env.sh docker compose up
#
# Uses dynamic ports - query with: docker compose port sandbox 3000

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: os
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d os"]
      interval: 10s
      timeout: 5s
      retries: 5

  neon-proxy:
    image: ghcr.io/timowilhelm/local-neon-http-proxy:main
    environment:
      - PG_CONNECTION_STRING=postgres://postgres:postgres@postgres:5432/os
    ports:
      - "4444:4444"
    depends_on:
      postgres:
        condition: service_healthy

  sandbox:
    build:
      context: .
      dockerfile: apps/os/sandbox/Dockerfile
      args:
        - SANDBOX_LOCAL_DEV=true
    ports:
      # Dynamic ports - Docker allocates random host ports
      # Query allocated port: docker compose port sandbox 3000
      - "3000"
      - "4096"
    volumes:
      # Mount host's .git directory (read-only) - container clones from this
      # Defaults to ./.git; alchemy.run.ts resolves worktrees to main .git dir
      - ${LOCAL_DOCKER_GIT_DIR:-./.git}:/home/iterate/.host-git:ro
    environment:
      - ITERATE_DEV=true
      # For local docker, the "customer repo" is the iterate repo itself
      - ITERATE_CUSTOMER_REPO_PATH=/home/iterate/src/github.com/iterate/iterate
      # Git info for cloning (defaults to HEAD, alchemy.run.ts can override)
      - LOCAL_DOCKER_GIT_COMMIT=${LOCAL_DOCKER_GIT_COMMIT:-HEAD}
      - LOCAL_DOCKER_GIT_BRANCH=${LOCAL_DOCKER_GIT_BRANCH:-}
    # Override Dockerfile ENTRYPOINT to use local-docker-compose-entrypoint.sh
    # This script clones from mounted .git, runs after-git-clone.sh, then execs entry.sh
    entrypoint: ["/app/local-docker-compose-entrypoint.sh"]

volumes:
  postgres-data:
