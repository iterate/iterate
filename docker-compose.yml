# Local development docker-compose
#
# Usage: docker compose up -d
#
# alchemy.run.ts sets COMPOSE_PROJECT_NAME=iterate-{folder}-{hash}
# for worktree isolation (each worktree gets its own containers/volumes).
#
# Note: One sandbox per machine at a time (fixed ports 3000, 4096).
# For multiple sandboxes, use Daytona.

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: os
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d os"]
      interval: 10s
      timeout: 5s
      retries: 5

  neon-proxy:
    image: ghcr.io/timowilhelm/local-neon-http-proxy:main
    environment:
      - PG_CONNECTION_STRING=postgres://postgres:postgres@postgres:5432/os
    ports:
      - "4444:4444"
    depends_on:
      postgres:
        condition: service_healthy

  sandbox:
    build:
      context: .
      dockerfile: apps/os/sandbox/Dockerfile
      args:
        - SANDBOX_LOCAL_DEV=true
    ports:
      - "3000:3000"
      - "4096:4096"
    volumes:
      # Mount repo directly at expected location
      - .:/home/iterate/src/github.com/iterate/iterate
      # Anonymous volume for node_modules (Linux binaries, inherits ownership from image)
      - /home/iterate/src/github.com/iterate/iterate/node_modules
    environment:
      - ITERATE_DEV=true
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
