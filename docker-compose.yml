# Local development docker-compose
#
# Usage: pnpm docker:up  (handles worktrees automatically)
#    or: ./scripts/docker-compose-env.sh docker compose up
#
# Uses dynamic ports - query with: docker compose port sandbox 3000

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: os
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d os"]
      interval: 10s
      timeout: 5s
      retries: 5

  neon-proxy:
    image: ghcr.io/timowilhelm/local-neon-http-proxy:main
    environment:
      - PG_CONNECTION_STRING=postgres://postgres:postgres@postgres:5432/os
    ports:
      - "4444:4444"
    depends_on:
      postgres:
        condition: service_healthy

  sandbox:
    build:
      context: .
      dockerfile: apps/os/sandbox/Dockerfile
      args:
        - SANDBOX_LOCAL_DEV=true
    ports:
      # Dynamic ports - Docker allocates random host ports
      # Query allocated port: docker compose port sandbox 3000
      - "3000"
      - "4096"
    volumes:
      # Mount host's .git directory (read-only) - container clones from this
      # Defaults to ./.git; alchemy.run.ts resolves worktrees to main .git dir
      - ${LOCAL_DOCKER_GIT_DIR:-./.git}:/home/iterate/.host-git:ro
    environment:
      - ITERATE_DEV=true
      # Git info for cloning (defaults to HEAD, alchemy.run.ts can override)
      - LOCAL_DOCKER_GIT_COMMIT=${LOCAL_DOCKER_GIT_COMMIT:-HEAD}
      - LOCAL_DOCKER_GIT_BRANCH=${LOCAL_DOCKER_GIT_BRANCH:-}
    # Override Dockerfile ENTRYPOINT so command runs directly
    entrypoint: []
    # Local dev setup: clone repo from mounted .git, install deps, then run entrypoint
    command:
      - /bin/bash
      - -c
      - |
        set -e
        ITERATE_REPO=/home/iterate/src/github.com/iterate/iterate

        echo "=== Local Docker dev setup ==="

        # Clone from mounted host .git directory
        # This gives container its own copy with full git history
        # Remove placeholder dir created by Dockerfile
        rm -rf "$$ITERATE_REPO"

        # Check if .host-git is a worktree gitdir file (not a real .git dir)
        if [ -f /home/iterate/.host-git ] && grep -q "^gitdir:" /home/iterate/.host-git 2>/dev/null; then
          echo "ERROR: Detected git worktree. The mounted .git is a file, not a directory."
          echo ""
          echo "For worktrees, set LOCAL_DOCKER_GIT_DIR to the main repo's .git directory:"
          echo "  LOCAL_DOCKER_GIT_DIR=/path/to/main/repo/.git docker compose up"
          echo ""
          echo "Or use alchemy.run.ts which handles this automatically."
          exit 1
        fi

        echo "Cloning from host .git directory..."
        git clone file:///home/iterate/.host-git "$$ITERATE_REPO"

        # Checkout the correct branch/commit
        cd "$$ITERATE_REPO"
        if [ -n "$${LOCAL_DOCKER_GIT_BRANCH:-}" ]; then
          echo "Checking out branch: $$LOCAL_DOCKER_GIT_BRANCH"
          git checkout "$$LOCAL_DOCKER_GIT_BRANCH"
        else
          echo "Checking out commit: $$LOCAL_DOCKER_GIT_COMMIT"
          git checkout "$$LOCAL_DOCKER_GIT_COMMIT"
        fi

        echo ""
        echo "Git status:"
        git status --short
        echo ""

        echo "Installing dependencies..."
        pnpm install --no-frozen-lockfile

        echo "Building daemon..."
        (cd apps/daemon && npx vite build)

        # Setup home directory (agent configs from home-skeleton)
        bash "$$ITERATE_REPO/apps/os/sandbox/setup-home.sh"

        # Hand off to universal entrypoint (proxy config, pidnap)
        exec /app/entry.sh

volumes:
  postgres-data:
