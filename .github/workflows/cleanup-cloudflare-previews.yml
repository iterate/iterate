# this file is generated by cleanup-cloudflare-previews.ts, do not edit it manually

name: Cleanup Cloudflare Previews
on:
  pull_request:
    types:
      - closed
jobs:
  cleanup:
    strategy:
      max-parallel: 1
      matrix:
        include:
          - appDisplayName: Codemode
            appPath: apps/codemode
            appSlug: codemode
          - appDisplayName: Example
            appPath: apps/example
            appSlug: example
          - appDisplayName: Events
            appPath: apps/events
            appSlug: events
          - appDisplayName: Semaphore
            appPath: apps/semaphore
            appSlug: semaphore
          - appDisplayName: Ingress Proxy
            appPath: apps/ingress-proxy
            appSlug: ingress-proxy
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
        if: github.event.pull_request.head.repo.fork != true
      - if: github.event.pull_request.head.repo.fork != true
        name: Cleanup preview from app-local script
        working-directory: ${{ matrix.appPath }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: doppler run --project os --config prd -- pnpm iterate --local-router ./scripts/router.ts local-router preview-cleanup-pr