# this file is generated by cleanup-cloudflare-previews.ts, do not edit it manually

name: Cleanup Cloudflare Previews
permissions:
  contents: read
  issues: write
  pull-requests: write
on:
  pull_request:
    types:
      - closed
jobs:
  cleanup:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - appDisplayName: Example
            appSlug: example
          - appDisplayName: Events
            appSlug: events
          - appDisplayName: Semaphore
            appSlug: semaphore
          - appDisplayName: Ingress Proxy
            appSlug: ingress-proxy
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
        if: github.event.pull_request.head.repo.fork != true
      - if: github.event.pull_request.head.repo.fork != true
        name: Cleanup preview from repo preview router
        env:
          APP: ${{ matrix.appSlug }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.ITERATE_BOT_GITHUB_TOKEN || github.token }}
        run: |-
          set -euo pipefail
          doppler run --project os --config prd -- pnpm preview cleanup \
            --app "$APP" \
            --github-token "$GITHUB_TOKEN" \
            --pull-request-number "${{ github.event.pull_request.number }}" \
            --repository-full-name "${{ github.repository }}"