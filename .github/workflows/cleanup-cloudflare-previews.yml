# this file is generated by cleanup-cloudflare-previews.ts, do not edit it manually

name: Cleanup Cloudflare Previews
on:
  pull_request:
    types:
      - closed
jobs:
  discover:
    runs-on: ubuntu-24.04
    outputs:
      preview_json: ${{ steps.discover.outputs.preview_json }}
      preview_matrix: ${{ steps.discover.outputs.preview_matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Setup Doppler
        run: doppler setup --config prd --project semaphore
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - id: discover
        name: Discover preview environments to destroy
        working-directory: apps/semaphore
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || '' }}
          REPOSITORY_FULL_NAME: ${{ github.repository }}
        run: |-
          set -euo pipefail
          preview_json="$(doppler run -- pnpm exec tsx ./scripts/preview-workflow.ts list-for-pr)"
          echo "preview_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$preview_json" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "preview_matrix<<EOF" >> "$GITHUB_OUTPUT"
          PREVIEW_JSON="$preview_json" pnpm exec tsx -e '
          const previewEnvironments = JSON.parse(process.env.PREVIEW_JSON ?? "[]");
          console.log(
            JSON.stringify(
              previewEnvironments.map((previewEnvironment) => ({
                previewEnvironmentAppSlug: previewEnvironment.previewEnvironmentAppSlug,
                previewEnvironmentDopplerConfigName: previewEnvironment.previewEnvironmentDopplerConfigName,
                previewEnvironmentIdentifier: previewEnvironment.previewEnvironmentIdentifier,
                previewEnvironmentSemaphoreLeaseId: previewEnvironment.previewEnvironmentSemaphoreLeaseId,
              })),
            ),
          );
          ' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
  cleanup:
    needs:
      - discover
    if: ${{ needs.discover.outputs.preview_matrix != '[]' }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.discover.outputs.preview_matrix) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Setup Doppler
        run: doppler setup --config ${{ matrix.previewEnvironmentDopplerConfigName }} --project ${{ matrix.previewEnvironmentAppSlug }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Destroy Cloudflare preview deployment
        working-directory: apps/${{ matrix.previewEnvironmentAppSlug }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- pnpm alchemy:down
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Setup Doppler
        run: doppler setup --config prd --project semaphore
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Finalize preview release in Semaphore
        working-directory: apps/semaphore
        env:
          DESTROY_REASON: pull-request-closed
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          PREVIEW_ENVIRONMENT_IDENTIFIER: ${{ matrix.previewEnvironmentIdentifier }}
          PREVIEW_ENVIRONMENT_SEMAPHORE_LEASE_ID: ${{ matrix.previewEnvironmentSemaphoreLeaseId }}
        run: doppler run -- pnpm exec tsx ./scripts/preview-workflow.ts destroy
  comment-pr:
    needs:
      - discover
      - cleanup
    if: always() && github.event_name == 'pull_request' && needs.discover.outputs.preview_json != '[]'
    runs-on: ubuntu-24.04
    steps:
      - name: update_pr_comment_on_cleanup
        id: update_pr_comment_on_cleanup
        uses: actions/github-script@v7
        with:
          script: |
            github.log = { ...console, debug: () => {} };
            // write a shimmed module of "../utils/cloudflare-preview-comment.ts" that actions/github-script can require (see https://github.com/actions/github-script?tab=readme-ov-file#this-action)
            require("fs").writeFileSync(
              ".github/ts-workflows/workflows/cleanup-cloudflare-previews.ts.utilscloudflarepreviewcommentts-9ae9b769e509d02a78fd7b74bcc702de-tsx-shim.cjs",
              'module.exports.load = () => require("tsx/esm/api").tsImport("../utils/cloudflare-preview-comment.ts", __filename);',
            );
            const vars = { github, context, core, glob, io, require };
            const cleanupResult = "${{ needs.cleanup.result }}";
            const previewCommentMarker = "<!-- CLOUDFLARE_PREVIEW_ENVIRONMENTS -->";
            const previewCommentStateLabel = "CLOUDFLARE_PREVIEW_ENVIRONMENTS_STATE";
            const previewJson = "${{ needs.discover.outputs.preview_json }}";
            const __handler = async function update_pr_comment_on_cleanup({ context, github }) {
              const pr = context.payload.pull_request;
              if (!pr) return;

              const { readPreviewCommentState, renderPreviewCommentBody } =
                await require(".github/ts-workflows/workflows/cleanup-cloudflare-previews.ts.utilscloudflarepreviewcommentts-9ae9b769e509d02a78fd7b74bcc702de-tsx-shim.cjs" /* <-- shimmed module of "../utils/cloudflare-preview-comment.ts" that actions/github-script can require */).load();
              const previewEnvironments = JSON.parse(previewJson);
              const now = new Date().toISOString();

              const existingComments = await github.rest.issues.listComments({
                ...context.repo,
                issue_number: pr.number,
                per_page: 100,
              });
              const existingComment = existingComments.data.find((comment) =>
                comment.body?.includes(previewCommentMarker),
              );
              if (!existingComment) {
                return;
              }

              const currentState = readPreviewCommentState({
                body: existingComment.body ?? "",
                previewCommentMarker,
                previewCommentStateLabel,
              }).currentState;
              const nextState = { ...currentState };

              for (const previewEnvironment of previewEnvironments) {
                const currentEntry = nextState[previewEnvironment.previewEnvironmentAppSlug];
                if (!currentEntry) {
                  continue;
                }

                nextState[previewEnvironment.previewEnvironmentAppSlug] = {
                  ...currentEntry,
                  message:
                    cleanupResult === "success"
                      ? "Preview environment released."
                      : "Preview cleanup failed. The deployment is still assigned for retry/debugging.",
                  status: cleanupResult === "success" ? "released" : "cleanup-failed",
                  updatedAt: now,
                };
              }

              await github.rest.issues.updateComment({
                ...context.repo,
                body: renderPreviewCommentBody({
                  previewCommentMarker,
                  previewCommentStateLabel,
                  state: nextState,
                }),
                comment_id: existingComment.id,
              });
            };
            return __handler(vars);