# this file is generated by cloudflare-previews.ts, do not edit it manually

name: Cloudflare Previews
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: cloudflare-previews-${{ github.event.pull_request.number }}
  cancel-in-progress: true
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    paths:
      - apps/example/**
      - apps/events/**
      - apps/semaphore/**
      - apps/ingress-proxy/**
jobs:
  preview:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
        if: github.event.pull_request.head.repo.fork != true
      - if: github.event.action != 'closed' && github.event.pull_request.head.repo.fork == true
        name: Sync previews for forks
        env:
          GITHUB_TOKEN: ${{ secrets.ITERATE_BOT_GITHUB_TOKEN || github.token }}
          SEMAPHORE_BASE_URL: https://semaphore.iterate.com
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |-
          set -euo pipefail
          pnpm preview sync-all \
            --github-token "$GITHUB_TOKEN" \
            --pull-request-head-ref-name "${{ github.event.pull_request.head.ref }}" \
            --pull-request-head-sha "${{ github.event.pull_request.head.sha }}" \
            --pull-request-base-sha "${{ github.event.pull_request.base.sha }}" \
            --pull-request-number "${{ github.event.pull_request.number }}" \
            --repository-full-name "${{ github.repository }}" \
            --is-fork "${{ github.event.pull_request.head.repo.fork && 'true' || 'false' }}" \
            --workflow-run-url "$WORKFLOW_RUN_URL" \
            --semaphore-base-url "$SEMAPHORE_BASE_URL"
      - if: github.event.action != 'closed' && github.event.pull_request.head.repo.fork != true
        name: Sync previews
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.ITERATE_BOT_GITHUB_TOKEN || github.token }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |-
          set -euo pipefail
          doppler run --project os --config prd -- pnpm preview sync-all \
            --github-token "$GITHUB_TOKEN" \
            --pull-request-head-ref-name "${{ github.event.pull_request.head.ref }}" \
            --pull-request-head-sha "${{ github.event.pull_request.head.sha }}" \
            --pull-request-base-sha "${{ github.event.pull_request.base.sha }}" \
            --pull-request-number "${{ github.event.pull_request.number }}" \
            --repository-full-name "${{ github.repository }}" \
            --is-fork "${{ github.event.pull_request.head.repo.fork && 'true' || 'false' }}" \
            --workflow-run-url "$WORKFLOW_RUN_URL"
      - if: github.event.action == 'closed' && github.event.pull_request.head.repo.fork != true
        name: Cleanup previews
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.ITERATE_BOT_GITHUB_TOKEN || github.token }}
        run: |-
          set -euo pipefail
          doppler run --project os --config prd -- pnpm preview cleanup-all \
            --github-token "$GITHUB_TOKEN" \
            --pull-request-number "${{ github.event.pull_request.number }}" \
            --repository-full-name "${{ github.repository }}"