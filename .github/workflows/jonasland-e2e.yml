# this file is generated by jonasland-e2e.ts, do not edit it manually

name: Jonasland E2E
permissions:
  contents: read
on:
  push:
    branches:
      - main
    paths:
      - jonasland/e2e/**
      - jonasland/sandbox/**
      - services/events-service/**
      - services/orders-service/**
      - services/docs-service/**
      - services/outerbase-service/**
      - packages/pidnap/**
      - .github/workflows/jonasland-e2e.yml
      - .github/ts-workflows/workflows/jonasland-e2e.ts
  pull_request:
    paths:
      - jonasland/e2e/**
      - jonasland/sandbox/**
      - services/events-service/**
      - services/orders-service/**
      - services/docs-service/**
      - services/outerbase-service/**
      - packages/pidnap/**
      - .github/workflows/jonasland-e2e.yml
      - .github/ts-workflows/workflows/jonasland-e2e.ts
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to test (branch, tag, or SHA). Leave empty for current branch.
        required: false
        type: string
        default: ""
jobs:
  e2e:
    runs-on: ${{ github.repository_owner == 'iterate' && 'depot-ubuntu-24.04-arm-4' || 'ubuntu-24.04' }}
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Docker info
        run: docker version && docker info
      - name: Build jonasland sandbox image
        run: pnpm --filter ./jonasland/sandbox build
      - name: Typecheck jonasland e2e
        run: pnpm --filter ./jonasland/e2e typecheck
      - name: Run jonasland playwright e2e
        run: pnpm --filter ./jonasland/e2e spec:e2e
      - name: Upload jonasland e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jonasland-e2e-results
          path: jonasland/e2e/test-results
          retention-days: 7