# this file is generated by deploy-streams-example-app.ts, do not edit it manually

name: Deploy Streams Example App
on:
  push:
    branches:
      - main
    paths:
      - .github/ts-workflows/workflows/deploy-streams-example-app.ts
      - .github/workflows/deploy-streams-example-app.yml
      - packages/streams/**
permissions:
  contents: read
concurrency:
  group: streams-example-app-prd
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: depot-ubuntu-24.04-32
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      WORKER_NAME: streams-example-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Build streams example app
        working-directory: packages/streams/example-app
        run: pnpm build
      - name: Deploy streams example app
        working-directory: packages/streams/example-app
        run: doppler run --project _shared --config prd -- pnpm exec wrangler deploy --name "$WORKER_NAME"