# this file is generated by jonasland-sandbox-image.ts, do not edit it manually

name: jonasland-sandbox-image
permissions:
  contents: read
  packages: write
  id-token: write
on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA). Leave empty to use caller SHA.
        required: false
        type: string
        default: ""
    outputs:
      image:
        description: Pushed jonasland sandbox image ref
        value: ${{ jobs.build.outputs.image }}
      git_sha:
        description: Git SHA that was built
        value: ${{ jobs.build.outputs.git_sha }}
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA). Leave empty for current branch.
        required: false
        type: string
        default: ""
jobs:
  build:
    runs-on: ${{ github.repository_owner == 'iterate' && 'depot-ubuntu-24.04-arm-4' || 'ubuntu-24.04' }}
    outputs:
      image: ${{ steps.image_meta.outputs.image }}
      git_sha: ${{ steps.image_meta.outputs.git_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Setup Depot CLI
        uses: depot/setup-action@v1
      - id: image_meta
        name: Compute image metadata
        env:
          REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/jonasland-sandbox
        run: |-
          set -euo pipefail
          git_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=7 HEAD)"
          image="${REGISTRY_IMAGE}:sha-${short_sha}"
          echo "git_sha=${git_sha}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push jonasland image (Depot)
        env:
          GIT_SHA: ${{ steps.image_meta.outputs.git_sha }}
          IMAGE: ${{ steps.image_meta.outputs.image }}
        run: |-
          set -euo pipefail
          depot build \
            --platform linux/amd64,linux/arm64 \
            -f jonasland/sandbox/Dockerfile \
            --build-arg GIT_SHA=${GIT_SHA} \
            -t ${IMAGE} \
            --push \
            .