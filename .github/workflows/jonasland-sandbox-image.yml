# this file is generated by jonasland-sandbox-image.ts, do not edit it manually

name: jonasland-sandbox-image
permissions:
  contents: read
  id-token: write
on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA). Leave empty to use caller SHA.
        required: false
        type: string
        default: ""
      doppler_config:
        description: Doppler config (dev, stg, prd).
        required: false
        type: string
        default: dev
    outputs:
      image:
        description: Fly registry image ref for jonasland sandbox
        value: ${{ jobs.build.outputs.image }}
      fly_image_tag:
        description: Fly registry image ref
        value: ${{ jobs.build.outputs.fly_image_tag }}
      depot_image_tag:
        description: Depot registry image ref
        value: ${{ jobs.build.outputs.depot_image_tag }}
      git_sha:
        description: Git SHA that was built
        value: ${{ jobs.build.outputs.git_sha }}
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA). Leave empty for current branch.
        required: false
        type: string
        default: ""
      doppler_config:
        description: Doppler config (dev, stg, prd).
        required: false
        type: string
        default: dev
jobs:
  build:
    runs-on: ${{ github.repository_owner == 'iterate' && 'depot-ubuntu-24.04-arm-4' || 'ubuntu-24.04' }}
    outputs:
      image: ${{ steps.output.outputs.image }}
      fly_image_tag: ${{ steps.output.outputs.fly_image_tag }}
      depot_image_tag: ${{ steps.output.outputs.depot_image_tag }}
      git_sha: ${{ steps.output.outputs.git_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.sha }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install pnpm
        run: |-
          set -euo pipefail
          export PNPM_VERSION=10.24.0
          curl -fsSL https://get.pnpm.io/install.sh | sh -
          echo "PNPM_HOME=$HOME/.local/share/pnpm" >> "$GITHUB_ENV"
          echo "$HOME/.local/share/pnpm" >> "$GITHUB_PATH"
          $HOME/.local/share/pnpm/pnpm --version
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Setup Doppler
        run: doppler setup --config ${{ inputs.doppler_config }} --project os
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Setup Depot CLI
        uses: depot/setup-action@v1
      - name: Build jonasland sandbox image
        env:
          JONASLAND_BUILD_PLATFORM: linux/amd64,linux/arm64
          JONASLAND_SKIP_LOAD: "true"
          JONASLAND_PUSH_FLY_REGISTRY: "true"
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- pnpm --filter ./jonasland/sandbox build
      - id: output
        name: Export image outputs
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |-
          set -euo pipefail
          doppler run -- pnpm --filter ./jonasland/sandbox image-refs -- --format=github-output >> "$GITHUB_OUTPUT"