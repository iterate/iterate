# this file is generated by e2e-tests.ts, do not edit it manually

name: e2e-tests
permissions:
  contents: read
  packages: write
  id-token: write
on:
  push:
    branches:
      - main
    paths:
      - jonasland/e2e/**
      - jonasland/sandbox/**
      - services/events-service/**
      - services/orders-service/**
      - services/docs-service/**
      - services/outerbase-service/**
      - services/home-service/**
      - services/egress-service/**
      - services/registry-service/**
      - packages/pidnap/**
      - .github/workflows/e2e-tests.yml
      - .github/workflows/e2e-specs.yml
      - .github/workflows/jonasland-sandbox-image.yml
      - .github/ts-workflows/workflows/e2e-tests.ts
      - .github/ts-workflows/workflows/e2e-specs.ts
      - .github/ts-workflows/workflows/jonasland-sandbox-image.ts
      - .github/ts-workflows/workflows/jonasland/**
  pull_request:
    paths:
      - jonasland/e2e/**
      - jonasland/sandbox/**
      - services/events-service/**
      - services/orders-service/**
      - services/docs-service/**
      - services/outerbase-service/**
      - services/home-service/**
      - services/egress-service/**
      - services/registry-service/**
      - packages/pidnap/**
      - .github/workflows/e2e-tests.yml
      - .github/workflows/e2e-specs.yml
      - .github/workflows/jonasland-sandbox-image.yml
      - .github/ts-workflows/workflows/e2e-tests.ts
      - .github/ts-workflows/workflows/e2e-specs.ts
      - .github/ts-workflows/workflows/jonasland-sandbox-image.ts
      - .github/ts-workflows/workflows/jonasland/**
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to test (branch, tag, or SHA). Leave empty for current branch.
        required: false
        type: string
        default: ""
jobs:
  build-image:
    uses: ./.github/workflows/jonasland-sandbox-image.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.sha }}
  e2e-tests:
    needs:
      - build-image
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Docker info
        run: docker version && docker info
      - name: Pull jonasland image
        env:
          JONASLAND_SANDBOX_IMAGE: ${{ needs.build-image.outputs.image }}
        run: docker pull "${JONASLAND_SANDBOX_IMAGE}"
      - name: Typecheck jonasland e2e
        run: pnpm --filter ./jonasland/e2e typecheck
      - name: Run jonasland vitest e2e against Docker
        env:
          RUN_JONASLAND_E2E: "true"
          JONASLAND_SANDBOX_IMAGE: ${{ needs.build-image.outputs.image }}
        run: pnpm --filter ./jonasland/e2e exec vitest run
      - name: Upload jonasland e2e test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jonasland-e2e-tests-results
          path: jonasland/e2e/test-results
          retention-days: 7