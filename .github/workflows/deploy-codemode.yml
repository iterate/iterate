# this file is generated by deploy-codemode.ts, do not edit it manually

name: Deploy Codemode
permissions:
  contents: read
  deployments: write
  issues: write
concurrency:
  group: codemode-${{ github.event.pull_request.number || github.ref_name || inputs.stage || 'prd' }}
  cancel-in-progress: true
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - apps/codemode/**
      - apps/codemode-contract/**
      - .github/ts-workflows/utils/cloudflare-app-workflow.ts
      - .github/ts-workflows/utils/cloudflare-apps.ts
      - .github/ts-workflows/workflows/cleanup-cloudflare-previews.ts
      - apps/semaphore-contract/**
      - packages/shared/src/apps/cloudflare-preview-comment.ts
      - packages/shared/src/apps/cloudflare-preview.ts
  push:
    branches:
      - main
    paths:
      - apps/codemode/**
      - apps/codemode-contract/**
      - .github/ts-workflows/utils/cloudflare-app-workflow.ts
      - .github/ts-workflows/utils/cloudflare-apps.ts
      - .github/ts-workflows/workflows/cleanup-cloudflare-previews.ts
      - apps/semaphore-contract/**
      - packages/shared/src/apps/cloudflare-preview-comment.ts
      - packages/shared/src/apps/cloudflare-preview.ts
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy. Leave empty for the current branch or commit.
        required: false
        type: string
        default: ""
      stage:
        description: Doppler config to deploy for manual runs.
        required: false
        type: string
        default: prd
jobs:
  variables:
    runs-on: ubuntu-24.04
    outputs:
      run_url: ${{ steps.vars.outputs.run_url }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
      stage: ${{ steps.vars.outputs.stage }}
    steps:
      - id: vars
        name: Resolve workflow variables
        env:
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |-
          echo "stage=${{ github.event_name == 'push' && 'prd' || inputs.stage || 'prd' }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GIT_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
  preview-pr:
    needs:
      - variables
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
        if: github.event.pull_request.head.repo.fork != true
      - if: github.event.pull_request.head.repo.fork != true
        name: Setup Doppler
        run: doppler setup --config stg --project codemode
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - if: github.event.pull_request.head.repo.fork == true
        name: Sync Codemode preview
        working-directory: apps/codemode
        env:
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_PR_IS_FORK: ${{ github.event.pull_request.head.repo.fork && 'true' || 'false' }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_URL: ${{ needs.variables.outputs.run_url }}
        run: pnpm iterate --local-router ./scripts/router.ts local-router preview-sync-pr
      - if: github.event.pull_request.head.repo.fork != true
        name: Sync Codemode preview
        working-directory: apps/codemode
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_PR_IS_FORK: ${{ github.event.pull_request.head.repo.fork && 'true' || 'false' }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_URL: ${{ needs.variables.outputs.run_url }}
        run: doppler run -- pnpm iterate --local-router ./scripts/router.ts local-router preview-sync-pr
  deploy:
    needs:
      - variables
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    outputs:
      public_url: ${{ steps.metadata.outputs.public_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Setup Doppler
        run: doppler setup --config ${{ needs.variables.outputs.stage }} --project codemode
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - id: metadata
        name: Resolve Codemode deploy URL
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |-
          set -euo pipefail
          routes="$(doppler secrets get WORKER_ROUTES --plain 2>/dev/null || true)"
          first_route="$(printf "%s" "$routes" | tr "," "\n" | sed -e "s#/\*$##" -e "s#^[[:space:]]*##" -e "s#[[:space:]]*$##" | awk 'NF { print; exit }')"
          if [ -n "$first_route" ]; then
            echo "public_url=https://${first_route}" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy apps/codemode
        working-directory: apps/codemode
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- pnpm alchemy:up
  slack-success:
    needs:
      - variables
      - deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: notify_slack_on_success
        id: notify_slack_on_success
        uses: actions/github-script@v7
        with:
          script: |
            github.log = { ...console, debug: () => {} };
            // write a shimmed module of "../utils/slack.ts" that actions/github-script can require (see https://github.com/actions/github-script?tab=readme-ov-file#this-action)
            require("fs").writeFileSync(
              ".github/ts-workflows/workflows/deploy-codemode.ts.utilsslackts-64e60416ee9563c2f22509a2a7a4ac68-tsx-shim.cjs",
              'module.exports.load = () => require("tsx/esm/api").tsImport("../utils/slack.ts", __filename);',
            );
            const vars = { github, context, core, glob, io, require };
            const appDisplayName = "Codemode";
            const publicUrl = "${{ needs.deploy.outputs.public_url }}";
            const runUrl = "${{ needs.variables.outputs.run_url }}";
            const shortSha = "${{ needs.variables.outputs.short_sha }}";
            const stage = "${{ needs.variables.outputs.stage }}";
            const __handler = async function notify_slack_on_success() {
              const { getSlackClient, slackChannelIds } =
                await require(".github/ts-workflows/workflows/deploy-codemode.ts.utilsslackts-64e60416ee9563c2f22509a2a7a4ac68-tsx-shim.cjs" /* <-- shimmed module of "../utils/slack.ts" that actions/github-script can require */).load();
              const slack = getSlackClient("${{ secrets.SLACK_CI_BOT_TOKEN }}");
              const message = [
                `✅ ${appDisplayName} ${stage} deploy succeeded (${shortSha})`,
                publicUrl ? `<${publicUrl}|Open app>` : null,
                `<${runUrl}|View workflow run>`,
              ]
                .filter(Boolean)
                .join(" · ");

              await slack.chat.postMessage({
                channel: slackChannelIds["#building"],
                text: message,
              });
            };
            return __handler(vars);
  slack-failure:
    needs:
      - variables
      - deploy
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy.result == 'failure'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: notify_slack_on_failure
        id: notify_slack_on_failure
        uses: actions/github-script@v7
        with:
          script: |
            github.log = { ...console, debug: () => {} };
            // write a shimmed module of "../utils/slack.ts" that actions/github-script can require (see https://github.com/actions/github-script?tab=readme-ov-file#this-action)
            require("fs").writeFileSync(
              ".github/ts-workflows/workflows/deploy-codemode.ts.utilsslackts-64e60416ee9563c2f22509a2a7a4ac68-tsx-shim.cjs",
              'module.exports.load = () => require("tsx/esm/api").tsImport("../utils/slack.ts", __filename);',
            );
            const vars = { github, context, core, glob, io, require };
            const appDisplayName = "Codemode";
            const runUrl = "${{ needs.variables.outputs.run_url }}";
            const shortSha = "${{ needs.variables.outputs.short_sha }}";
            const stage = "${{ needs.variables.outputs.stage }}";
            const __handler = async function notify_slack_on_failure() {
              const { getSlackClient, slackChannelIds } =
                await require(".github/ts-workflows/workflows/deploy-codemode.ts.utilsslackts-64e60416ee9563c2f22509a2a7a4ac68-tsx-shim.cjs" /* <-- shimmed module of "../utils/slack.ts" that actions/github-script can require */).load();
              const slack = getSlackClient("${{ secrets.SLACK_CI_BOT_TOKEN }}");
              const message = [
                `🚨 ${appDisplayName} ${stage} deploy failed (${shortSha}).`,
                `<${runUrl}|View workflow run>`,
                "@iterate please investigate",
              ].join(" ");

              await slack.chat.postMessage({
                channel: slackChannelIds["#error-pulse"],
                text: message,
              });
            };
            return __handler(vars);