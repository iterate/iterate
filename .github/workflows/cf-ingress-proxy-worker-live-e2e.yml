# this file is generated by cf-ingress-proxy-worker-live-e2e.ts, do not edit it manually

name: CF Ingress Proxy Worker Live E2E
permissions:
  contents: read
  deployments: write
on:
  push:
    branches:
      - main
    paths:
      - apps/cf-ingress-proxy-worker/**
      - .github/ts-workflows/workflows/cf-ingress-proxy-worker-live-e2e.ts
      - .github/workflows/cf-ingress-proxy-worker-live-e2e.yml
  pull_request:
    paths:
      - apps/cf-ingress-proxy-worker/**
      - .github/ts-workflows/workflows/cf-ingress-proxy-worker-live-e2e.ts
      - .github/workflows/cf-ingress-proxy-worker-live-e2e.yml
  workflow_dispatch: {}
jobs:
  deploy-test:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      ALCHEMY_CI_STATE_STORE_CHECK: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Setup Doppler
        run: doppler setup --config stg --project os
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Deploy shared ci-ingress worker
        working-directory: apps/cf-ingress-proxy-worker
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          WORKER_NAME: ci-ingress
          INGRESS_PROXY_HOSTNAME: ci-ingress.iterate.com
        run: |-
          set -euo pipefail
          doppler run --config stg -- sh -c 'pnpm run deploy:stg'
      - name: Run live Vitest E2E against ci-ingress
        working-directory: apps/cf-ingress-proxy-worker
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |-
          set -euo pipefail
          doppler run --config stg -- sh -c 'pnpm --filter @iterate-com/cf-ingress-proxy-worker test:e2e-live'
  deploy-prd:
    if: github.event_name == 'push'
    needs:
      - deploy-test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Setup Doppler
        run: doppler setup --config prd --project os
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Deploy apps/cf-ingress-proxy-worker
        working-directory: apps/cf-ingress-proxy-worker
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          WORKER_NAME: ingress-proxy
          INGRESS_PROXY_HOSTNAME: ingress.iterate.com
        run: pnpm run deploy:prd