# this file is generated by ai-engineer-workshop.ts, do not edit it manually

name: AI Engineer Workshop
on:
  pull_request:
    paths:
      - ai-engineer-workshop/**
      - .github/ts-workflows/workflows/ai-engineer-workshop.ts
  push:
    branches:
      - main
    paths:
      - ai-engineer-workshop/**
      - .github/ts-workflows/workflows/ai-engineer-workshop.ts
  workflow_dispatch: {}
jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Typecheck package
        run: pnpm --filter ai-engineer-workshop typecheck
      - name: Build package
        run: pnpm --filter ai-engineer-workshop build
      - name: Publish preview package
        run: pnpx pkg-pr-new publish --pnpm './ai-engineer-workshop'
