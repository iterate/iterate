# this file is generated by integration.ts, do not edit it manually

name: Integration
on:
  push:
    branches:
      - main
  pull_request: {}
jobs:
  integration:
    runs-on: ${{ github.repository_owner == 'iterate' && 'depot-ubuntu-24.04-arm-4' || 'ubuntu-24.04' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - run: pnpm docker:up
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Setup Doppler
        run: doppler setup --config dev --project os
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Create test results folder
        run: mkdir -p test-results
      - name: Start dev server
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: nohup doppler run -- pnpm dev > test-results/pnpm-dev.log 2>&1 &
      - name: Wait for dev server
        run: |-
          for i in $(seq 1 180); do
            if curl -fsS http://local.iterate.com:5173/api/testing/db-connection-probe >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          tail -100 test-results/pnpm-dev.log || true
          exit 1
      - name: Run integration tests
        run: |-
          set -o pipefail
          mkdir -p test-results/vitest-report
          cd apps/os
          doppler run -- pnpm exec vitest run --config vitest.integration.config.ts --reporter=default --reporter=html --outputFile.html=../../test-results/vitest-report/index.html | tee ../../test-results/vitest.txt
      - name: Upload integration artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results
          path: test-results
          retention-days: 7