# this file is generated by deploy-example.ts, do not edit it manually

name: Deploy Example
permissions:
  contents: read
  deployments: write
  issues: write
concurrency:
  group: example-${{ github.event.pull_request.number || github.ref_name || inputs.stage || 'prd' }}
  cancel-in-progress: true
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - apps/example/**
      - apps/example-contract/**
      - packages/shared/src/apps/common-router-contract.ts
      - .github/ts-workflows/utils/cloudflare-app-workflow.ts
      - .github/ts-workflows/utils/cloudflare-apps.ts
      - .github/ts-workflows/utils/cloudflare-preview-comment.ts
      - .github/ts-workflows/workflows/cleanup-cloudflare-previews.ts
      - apps/semaphore/scripts/preview-workflow.ts
  push:
    branches:
      - main
    paths:
      - apps/example/**
      - apps/example-contract/**
      - packages/shared/src/apps/common-router-contract.ts
      - .github/ts-workflows/utils/cloudflare-app-workflow.ts
      - .github/ts-workflows/utils/cloudflare-apps.ts
      - .github/ts-workflows/utils/cloudflare-preview-comment.ts
      - .github/ts-workflows/workflows/cleanup-cloudflare-previews.ts
      - apps/semaphore/scripts/preview-workflow.ts
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy. Leave empty for the current branch or commit.
        required: false
        type: string
        default: ""
      stage:
        description: Doppler config to deploy for manual runs.
        required: false
        type: string
        default: prd
jobs:
  variables:
    runs-on: ubuntu-24.04
    outputs:
      is_fork: ${{ steps.vars.outputs.is_fork }}
      run_url: ${{ steps.vars.outputs.run_url }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
      stage: ${{ steps.vars.outputs.stage }}
    steps:
      - id: vars
        name: Resolve workflow variables
        env:
          GIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |-
          echo "stage=${{ github.event_name == 'push' && 'prd' || inputs.stage || 'prd' }}" >> "$GITHUB_OUTPUT"
          echo "is_fork=${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'true' || 'false' }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GIT_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
  preview:
    needs:
      - variables
    if: github.event_name == 'pull_request' && needs.variables.outputs.is_fork != 'true'
    runs-on: ubuntu-24.04
    outputs:
      preview_json: ${{ steps.preview.outputs.preview_json }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Setup Doppler
        run: doppler setup --config prd --project semaphore
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - id: preview
        name: Claim Example preview environment
        working-directory: apps/semaphore
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          PREVIEW_ENVIRONMENT_APP_SLUG: example
          PREVIEW_LEASE_MS: "21600000"
          PULL_REQUEST_HEAD_REF_NAME: ${{ github.event.pull_request.head.ref }}
          PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY_FULL_NAME: ${{ github.repository }}
          WORKFLOW_RUN_URL: ${{ needs.variables.outputs.run_url }}
        run: |-
          set -euo pipefail
          preview_json="$(doppler run -- pnpm exec tsx ./scripts/preview-workflow.ts create)"
          echo "preview_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$preview_json" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
  deploy:
    needs:
      - variables
      - preview
    if: (github.event_name == 'push') || (github.event_name == 'workflow_dispatch') || (github.event_name == 'pull_request' && needs.variables.outputs.is_fork != 'true' && needs.preview.result == 'success')
    runs-on: ubuntu-24.04
    outputs:
      public_url: ${{ steps.metadata.outputs.public_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Setup Doppler
        run: doppler setup --config ${{ github.event_name == 'pull_request' && fromJson(needs.preview.outputs.preview_json).previewEnvironmentDopplerConfigName || needs.variables.outputs.stage }} --project example
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - id: metadata
        name: Resolve Example deploy URL
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |-
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "public_url=https://${{ fromJson(needs.preview.outputs.preview_json).previewEnvironmentWorkersDevHostname }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          routes="$(doppler secrets get WORKER_ROUTES --plain 2>/dev/null || true)"
          first_route="$(printf "%s" "$routes" | tr "," "\n" | sed -e "s#/\*$##" -e "s#^[[:space:]]*##" -e "s#[[:space:]]*$##" | awk 'NF { print; exit }')"
          if [ -n "$first_route" ]; then
            echo "public_url=https://${first_route}" >> "$GITHUB_OUTPUT"
          fi
      - name: Recreate Example preview deployment
        if: github.event_name == 'pull_request'
        working-directory: apps/example
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- pnpm alchemy:down || true
      - name: Deploy apps/example
        working-directory: apps/example
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- pnpm alchemy:up
  test-preview:
    needs:
      - variables
      - preview
      - deploy
    if: github.event_name == 'pull_request' && needs.variables.outputs.is_fork != 'true' && needs.preview.result == 'success' && needs.deploy.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Setup Doppler
        run: doppler setup --config ${{ fromJson(needs.preview.outputs.preview_json).previewEnvironmentDopplerConfigName }} --project example
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Run Example preview tests
        working-directory: apps/example
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          EXAMPLE_BASE_URL: ${{ needs.deploy.outputs.public_url }}
        run: doppler run -- pnpm test:e2e
  comment-pr:
    needs:
      - variables
      - preview
      - deploy
      - test-preview
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: update_pr_comment
        id: update_pr_comment
        uses: actions/github-script@v7
        with:
          script: |
            github.log = { ...console, debug: () => {} };
            // write a shimmed module of "../utils/cloudflare-preview-comment.ts" that actions/github-script can require (see https://github.com/actions/github-script?tab=readme-ov-file#this-action)
            require("fs").writeFileSync(
              ".github/ts-workflows/workflows/deploy-example.ts.utilscloudflarepreviewcommentts-9ae9b769e509d02a78fd7b74bcc702de-tsx-shim.cjs",
              'module.exports.load = () => require("tsx/esm/api").tsImport("../utils/cloudflare-preview-comment.ts", __filename);',
            );
            const vars = { github, context, core, glob, io, require };
            const appDisplayName = "Example";
            const appSlug = "example";
            const deployResult = "${{ needs.deploy.result }}";
            const isFork = "${{ needs.variables.outputs.is_fork }}";
            const previewCommentMarker = "<!-- CLOUDFLARE_PREVIEW_ENVIRONMENTS -->";
            const previewCommentStateLabel = "CLOUDFLARE_PREVIEW_ENVIRONMENTS_STATE";
            const previewJson = "${{ needs.preview.outputs.preview_json }}";
            const previewResult = "${{ needs.preview.result }}";
            const publicUrl = "${{ needs.deploy.outputs.public_url }}";
            const runUrl = "${{ needs.variables.outputs.run_url }}";
            const shortSha = "${{ needs.variables.outputs.short_sha }}";
            const testResult = "${{ needs['test-preview'].result }}";
            const __handler = async function update_pr_comment({ context, github }) {
              const pr = context.payload.pull_request;
              if (!pr) return;

              const { readPreviewCommentState, renderPreviewCommentBody } =
                await require(".github/ts-workflows/workflows/deploy-example.ts.utilscloudflarepreviewcommentts-9ae9b769e509d02a78fd7b74bcc702de-tsx-shim.cjs" /* <-- shimmed module of "../utils/cloudflare-preview-comment.ts" that actions/github-script can require */).load();
              const now = new Date().toISOString();

              const existingComments = await github.rest.issues.listComments({
                ...context.repo,
                issue_number: pr.number,
                per_page: 100,
              });
              const existingComment = existingComments.data.find((comment) =>
                comment.body?.includes(previewCommentMarker),
              );
              const currentState = readPreviewCommentState({
                body: existingComment?.body ?? `${previewCommentMarker}\n## Preview Environments`,
                previewCommentMarker,
                previewCommentStateLabel,
              }).currentState;

              const previewEnvironment = previewJson && previewJson !== "" ? JSON.parse(previewJson) : null;

              const nextState = {
                ...currentState,
                [appSlug]:
                  isFork === "true"
                    ? {
                        appDisplayName,
                        message: "Preview environments are unavailable for fork pull requests.",
                        runUrl,
                        shortSha,
                        status: "fork-unavailable",
                        updatedAt: now,
                      }
                    : previewResult !== "success"
                      ? {
                          appDisplayName,
                          message: "Failed to claim a preview environment.",
                          runUrl,
                          shortSha,
                          status: "claim-failed",
                          updatedAt: now,
                        }
                      : deployResult !== "success"
                        ? {
                            appDisplayName,
                            leasedUntil: previewEnvironment?.leasedUntil ?? null,
                            message: "Preview deployment failed.",
                            previewEnvironmentAlchemyStageName:
                              previewEnvironment?.previewEnvironmentAlchemyStageName ?? null,
                            previewEnvironmentDopplerConfigName:
                              previewEnvironment?.previewEnvironmentDopplerConfigName ?? null,
                            previewEnvironmentIdentifier:
                              previewEnvironment?.previewEnvironmentIdentifier ?? null,
                            previewEnvironmentSemaphoreLeaseId:
                              previewEnvironment?.previewEnvironmentSemaphoreLeaseId ?? null,
                            publicUrl: publicUrl || null,
                            runUrl,
                            shortSha,
                            status: "deploy-failed",
                            updatedAt: now,
                          }
                        : testResult === "failure"
                          ? {
                              appDisplayName,
                              leasedUntil: previewEnvironment?.leasedUntil ?? null,
                              message: "Preview tests failed after deploy.",
                              previewEnvironmentAlchemyStageName:
                                previewEnvironment?.previewEnvironmentAlchemyStageName ?? null,
                              previewEnvironmentDopplerConfigName:
                                previewEnvironment?.previewEnvironmentDopplerConfigName ?? null,
                              previewEnvironmentIdentifier:
                                previewEnvironment?.previewEnvironmentIdentifier ?? null,
                              previewEnvironmentSemaphoreLeaseId:
                                previewEnvironment?.previewEnvironmentSemaphoreLeaseId ?? null,
                              publicUrl,
                              runUrl,
                              shortSha,
                              status: "tests-failed",
                              updatedAt: now,
                            }
                          : {
                              appDisplayName,
                              leasedUntil: previewEnvironment?.leasedUntil ?? null,
                              previewEnvironmentAlchemyStageName:
                                previewEnvironment?.previewEnvironmentAlchemyStageName ?? null,
                              previewEnvironmentDopplerConfigName:
                                previewEnvironment?.previewEnvironmentDopplerConfigName ?? null,
                              previewEnvironmentIdentifier:
                                previewEnvironment?.previewEnvironmentIdentifier ?? null,
                              previewEnvironmentSemaphoreLeaseId:
                                previewEnvironment?.previewEnvironmentSemaphoreLeaseId ?? null,
                              publicUrl,
                              runUrl,
                              shortSha,
                              status: "deployed",
                              updatedAt: now,
                            },
              };

              const body = renderPreviewCommentBody({
                previewCommentMarker,
                previewCommentStateLabel,
                state: nextState,
              });

              if (existingComment) {
                await github.rest.issues.updateComment({
                  ...context.repo,
                  body,
                  comment_id: existingComment.id,
                });
                return;
              }

              await github.rest.issues.createComment({
                ...context.repo,
                body,
                issue_number: pr.number,
              });
            };
            return __handler(vars);
  slack-success:
    needs:
      - variables
      - deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: notify_slack_on_success
        id: notify_slack_on_success
        uses: actions/github-script@v7
        with:
          script: |
            github.log = { ...console, debug: () => {} };
            // write a shimmed module of "../utils/slack.ts" that actions/github-script can require (see https://github.com/actions/github-script?tab=readme-ov-file#this-action)
            require("fs").writeFileSync(
              ".github/ts-workflows/workflows/deploy-example.ts.utilsslackts-64e60416ee9563c2f22509a2a7a4ac68-tsx-shim.cjs",
              'module.exports.load = () => require("tsx/esm/api").tsImport("../utils/slack.ts", __filename);',
            );
            const vars = { github, context, core, glob, io, require };
            const appDisplayName = "Example";
            const publicUrl = "${{ needs.deploy.outputs.public_url }}";
            const runUrl = "${{ needs.variables.outputs.run_url }}";
            const shortSha = "${{ needs.variables.outputs.short_sha }}";
            const stage = "${{ needs.variables.outputs.stage }}";
            const __handler = async function notify_slack_on_success() {
              const { getSlackClient, slackChannelIds } =
                await require(".github/ts-workflows/workflows/deploy-example.ts.utilsslackts-64e60416ee9563c2f22509a2a7a4ac68-tsx-shim.cjs" /* <-- shimmed module of "../utils/slack.ts" that actions/github-script can require */).load();
              const slack = getSlackClient("${{ secrets.SLACK_CI_BOT_TOKEN }}");
              const message = [
                `✅ ${appDisplayName} ${stage} deploy succeeded (${shortSha})`,
                publicUrl ? `<${publicUrl}|Open app>` : null,
                `<${runUrl}|View workflow run>`,
              ]
                .filter(Boolean)
                .join(" · ");

              await slack.chat.postMessage({
                channel: slackChannelIds["#building"],
                text: message,
              });
            };
            return __handler(vars);
  slack-failure:
    needs:
      - variables
      - deploy
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy.result == 'failure'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: notify_slack_on_failure
        id: notify_slack_on_failure
        uses: actions/github-script@v7
        with:
          script: |
            github.log = { ...console, debug: () => {} };
            // write a shimmed module of "../utils/slack.ts" that actions/github-script can require (see https://github.com/actions/github-script?tab=readme-ov-file#this-action)
            require("fs").writeFileSync(
              ".github/ts-workflows/workflows/deploy-example.ts.utilsslackts-64e60416ee9563c2f22509a2a7a4ac68-tsx-shim.cjs",
              'module.exports.load = () => require("tsx/esm/api").tsImport("../utils/slack.ts", __filename);',
            );
            const vars = { github, context, core, glob, io, require };
            const appDisplayName = "Example";
            const runUrl = "${{ needs.variables.outputs.run_url }}";
            const shortSha = "${{ needs.variables.outputs.short_sha }}";
            const stage = "${{ needs.variables.outputs.stage }}";
            const __handler = async function notify_slack_on_failure() {
              const { getSlackClient, slackChannelIds } =
                await require(".github/ts-workflows/workflows/deploy-example.ts.utilsslackts-64e60416ee9563c2f22509a2a7a4ac68-tsx-shim.cjs" /* <-- shimmed module of "../utils/slack.ts" that actions/github-script can require */).load();
              const slack = getSlackClient("${{ secrets.SLACK_CI_BOT_TOKEN }}");
              const message = [
                `🚨 ${appDisplayName} ${stage} deploy failed (${shortSha}).`,
                `<${runUrl}|View workflow run>`,
                "@iterate please investigate",
              ].join(" ");

              await slack.chat.postMessage({
                channel: slackChannelIds["#error-pulse"],
                text: message,
              });
            };
            return __handler(vars);