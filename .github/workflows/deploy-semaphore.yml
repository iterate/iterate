# this file is generated by deploy-semaphore.ts, do not edit it manually

name: Deploy Semaphore
permissions:
  contents: read
  deployments: write
concurrency:
  group: semaphore-${{ github.ref_name || 'prd' }}
  cancel-in-progress: true
on:
  push:
    branches:
      - main
    paths:
      - apps/semaphore/**
      - apps/semaphore-contract/**
      - packages/shared/src/alchemy/**
      - packages/shared/src/apps/**
      - packages/ui/**
      - packages/mock-http-proxy/**
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy. Leave empty for the current branch or commit.
        required: false
        type: string
        default: ""
jobs:
  variables:
    runs-on: depot-ubuntu-24.04-32
    outputs:
      run_url: ${{ steps.vars.outputs.run_url }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - id: vars
        name: Resolve workflow variables
        env:
          GIT_SHA: ${{ github.sha }}
        run: |-
          echo "short_sha=${GIT_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
  deploy:
    needs:
      - variables
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: depot-ubuntu-24.04-32
    outputs:
      public_url: ${{ steps.metadata.outputs.public_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Setup Doppler
        run: doppler setup --config prd --project semaphore
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - id: metadata
        name: Resolve Semaphore deploy URL
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |-
          set -euo pipefail
          public_url="$(doppler run -- pnpm tsx -e 'import { resolveNewStyleCloudflareAppBaseUrlFromEnv } from "@iterate-com/shared/apps/new-style-cloudflare-apps"; console.log(resolveNewStyleCloudflareAppBaseUrlFromEnv(process.env) ?? "");')"
          if [ -n "$public_url" ]; then
            echo "public_url=${public_url}" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy apps/semaphore
        working-directory: apps/semaphore
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- pnpm tsx ./alchemy.run.ts
  slack-success:
    needs:
      - variables
      - deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy.result == 'success'
    runs-on: depot-ubuntu-24.04-32
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: notify_slack_on_success
        id: notify_slack_on_success
        uses: actions/github-script@v7
        with:
          script: |
            github.log = { ...console, debug: () => {} };
            // write a shimmed module of "../utils/slack.ts" that actions/github-script can require (see https://github.com/actions/github-script?tab=readme-ov-file#this-action)
            require("fs").writeFileSync(
              ".github/ts-workflows/workflows/deploy-semaphore.ts.utilsslackts-64e60416ee9563c2f22509a2a7a4ac68-tsx-shim.cjs",
              'module.exports.load = () => require("tsx/esm/api").tsImport("../utils/slack.ts", __filename);',
            );
            const vars = { github, context, core, glob, io, require };
            const appDisplayName = "Semaphore";
            const publicUrl = "${{ needs.deploy.outputs.public_url }}";
            const runUrl = "${{ needs.variables.outputs.run_url }}";
            const shortSha = "${{ needs.variables.outputs.short_sha }}";
            const slackChannelName = "#ci";
            const __handler = async function notify_slack_on_success() {
              const { getSlackClient, slackChannelIds } =
                await require(".github/ts-workflows/workflows/deploy-semaphore.ts.utilsslackts-64e60416ee9563c2f22509a2a7a4ac68-tsx-shim.cjs" /* <-- shimmed module of "../utils/slack.ts" that actions/github-script can require */).load();
              const slack = getSlackClient("${{ secrets.SLACK_CI_BOT_TOKEN }}");
              const message = [
                `✅ ${appDisplayName} prd deploy succeeded (${shortSha})`,
                publicUrl ? `<${publicUrl}|Open app>` : null,
                `<${runUrl}|View workflow run>`,
              ]
                .filter(Boolean)
                .join(" · ");

              await slack.chat.postMessage({
                channel: slackChannelIds[slackChannelName] ?? slackChannelName,
                text: message,
              });
            };
            return __handler(vars);
  slack-failure:
    needs:
      - variables
      - deploy
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy.result == 'failure'
    runs-on: depot-ubuntu-24.04-32
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: notify_slack_on_failure
        id: notify_slack_on_failure
        uses: actions/github-script@v7
        with:
          script: |
            github.log = { ...console, debug: () => {} };
            // write a shimmed module of "../utils/slack.ts" that actions/github-script can require (see https://github.com/actions/github-script?tab=readme-ov-file#this-action)
            require("fs").writeFileSync(
              ".github/ts-workflows/workflows/deploy-semaphore.ts.utilsslackts-64e60416ee9563c2f22509a2a7a4ac68-tsx-shim.cjs",
              'module.exports.load = () => require("tsx/esm/api").tsImport("../utils/slack.ts", __filename);',
            );
            const vars = { github, context, core, glob, io, require };
            const appDisplayName = "Semaphore";
            const runUrl = "${{ needs.variables.outputs.run_url }}";
            const shortSha = "${{ needs.variables.outputs.short_sha }}";
            const slackChannelName = "#ci";
            const __handler = async function notify_slack_on_failure() {
              const { getSlackClient, slackChannelIds } =
                await require(".github/ts-workflows/workflows/deploy-semaphore.ts.utilsslackts-64e60416ee9563c2f22509a2a7a4ac68-tsx-shim.cjs" /* <-- shimmed module of "../utils/slack.ts" that actions/github-script can require */).load();
              const slack = getSlackClient("${{ secrets.SLACK_CI_BOT_TOKEN }}");
              const message = [
                `🚨 ${appDisplayName} prd deploy failed (${shortSha}).`,
                `<${runUrl}|View workflow run>`,
                "@iterate please investigate",
              ].join(" ");

              await slack.chat.postMessage({
                channel: slackChannelIds[slackChannelName] ?? slackChannelName,
                text: message,
