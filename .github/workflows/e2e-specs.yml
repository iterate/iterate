# this file is generated by e2e-specs.ts, do not edit it manually

name: e2e-specs
permissions:
  contents: read
  packages: write
  id-token: write
on:
  push:
    branches:
      - main
    paths:
      - jonasland/e2e/**
      - jonasland/sandbox/**
      - services/events-service/**
      - services/orders-service/**
      - services/docs-service/**
      - services/outerbase-service/**
      - services/home-service/**
      - services/egress-service/**
      - services/registry-service/**
      - packages/pidnap/**
      - .github/workflows/e2e-tests.yml
      - .github/workflows/e2e-specs.yml
      - .github/workflows/jonasland-sandbox-image.yml
      - .github/ts-workflows/workflows/e2e-tests.ts
      - .github/ts-workflows/workflows/e2e-specs.ts
      - .github/ts-workflows/workflows/jonasland-sandbox-image.ts
      - .github/ts-workflows/workflows/jonasland/**
  pull_request:
    paths:
      - jonasland/e2e/**
      - jonasland/sandbox/**
      - services/events-service/**
      - services/orders-service/**
      - services/docs-service/**
      - services/outerbase-service/**
      - services/home-service/**
      - services/egress-service/**
      - services/registry-service/**
      - packages/pidnap/**
      - .github/workflows/e2e-tests.yml
      - .github/workflows/e2e-specs.yml
      - .github/workflows/jonasland-sandbox-image.yml
      - .github/ts-workflows/workflows/e2e-tests.ts
      - .github/ts-workflows/workflows/e2e-specs.ts
      - .github/ts-workflows/workflows/jonasland-sandbox-image.ts
      - .github/ts-workflows/workflows/jonasland/**
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to test (branch, tag, or SHA). Leave empty for current branch.
        required: false
        type: string
        default: ""
jobs:
  build-image:
    uses: ./.github/workflows/jonasland-sandbox-image.yml
    secrets: inherit
    with:
      ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.sha }}
  e2e-specs:
    needs:
      - build-image
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.sha }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install pnpm
        run: |-
          set -euo pipefail
          export PNPM_VERSION=10.24.0
          for i in 1 2 3; do curl -fsSL https://get.pnpm.io/install.sh | sh - && break; if [ "$i" -eq 3 ]; then echo "Failed to install pnpm after $i attempts"; exit 1; fi; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          echo "PNPM_HOME=$HOME/.local/share/pnpm" >> "$GITHUB_ENV"
          echo "$HOME/.local/share/pnpm" >> "$GITHUB_PATH"
          $HOME/.local/share/pnpm/pnpm --version
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Setup Doppler
        run: doppler setup --config dev --project os
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Docker info
        run: docker version && docker info
      - name: Login to Fly registry
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |-
          set -euo pipefail
          doppler run -- sh -c 'echo "$FLY_API_TOKEN" | docker login registry.fly.io -u x --password-stdin'
      - name: Pull jonasland image
        env:
          JONASLAND_SANDBOX_IMAGE: ${{ needs.build-image.outputs.image }}
        run: docker pull "${JONASLAND_SANDBOX_IMAGE}"
      - name: Install Playwright browsers
        run: pnpm --filter ./jonasland/e2e exec playwright install --with-deps chromium
      - name: Typecheck jonasland e2e
        run: pnpm --filter ./jonasland/e2e typecheck
      - name: Run jonasland playwright specs against Docker
        env:
          RUN_JONASLAND_E2E: "true"
          JONASLAND_SANDBOX_IMAGE: ${{ needs.build-image.outputs.image }}
        run: pnpm --filter ./jonasland/e2e spec:e2e
      - name: Upload jonasland e2e spec artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jonasland-e2e-spec-results
          path: jonasland/e2e/test-results
          retention-days: 7