name: Build Preview CI Image

on:
  schedule:
    # Keep the baked dependency tree fresh for fast PR preview trials.
    - cron: "17 4 * * *"
  workflow_dispatch: {}

env:
  PREVIEW_CI_IMAGE: 0p91s0lz49.registry.depot.dev/iterate-preview-ci:node24-pnpm10-worktree
  PNPM_CONFIG_STORE_DIR: /mnt/cache/pnpm-store

jobs:
  build-image:
    name: Build preview CI image
    runs-on: depot-ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Mount pnpm cache disk
        uses: depot/cache-mount@v1
        with:
          name: iterate-preview-pnpm-store
          path: /mnt/cache/pnpm-store
          write-lock: /mnt/cache/pnpm-store

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: |-
          set -euo pipefail
          npm install --global pnpm@10.24.0
          pnpm config set store-dir "$PNPM_CONFIG_STORE_DIR"
          pnpm --version
          pnpm store path

      - name: Install dependencies
        run: pnpm install

      - name: Bake Node and pnpm onto PATH
        run: |-
          set -euo pipefail
          node_root="$(dirname "$(dirname "$(command -v node)")")"
          sudo rm -rf /opt/iterate-node
          sudo cp -a "$node_root" /opt/iterate-node
          sudo ln -sf /opt/iterate-node/bin/node /usr/local/bin/node
          sudo ln -sf /opt/iterate-node/bin/npm /usr/local/bin/npm
          sudo ln -sf /opt/iterate-node/bin/npx /usr/local/bin/npx
          sudo ln -sf /opt/iterate-node/bin/pnpm /usr/local/bin/pnpm
          node --version
          pnpm --version

      - name: Install Doppler CLI
        run: |-
          curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager
          doppler --version

      - name: Install preview browser
        run: pnpm --dir apps/streams-example-app exec playwright install chromium

      - name: Report baked cache size
        run: |-
          set -euo pipefail
          echo "pnpm-store=$(pnpm store path)"
          du -sh "$(pnpm store path)" || true
          du -sh node_modules || true
          du -sh apps/streams-example-app/node_modules || true
          du -sh /home/runner/.cache/ms-playwright || true

      # Keep node_modules and the pnpm store in the image. Consumers must use
      # actions/checkout with clean:false so checkout does not delete the baked
      # install tree before pnpm can validate/reuse it.
      - name: Snapshot preview CI image
        uses: depot/snapshot-action@v1
        with:
          image: ${{ env.PREVIEW_CI_IMAGE }}
