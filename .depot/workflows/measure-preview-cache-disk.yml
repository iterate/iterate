name: Measure Preview Cache Disk

on:
  workflow_dispatch: {}

env:
  PNPM_CONFIG_STORE_DIR: /mnt/cache/pnpm-store

jobs:
  setup:
    name: Measure preview cache disk setup
    runs-on: depot-ubuntu-24.04-16
    steps:
      - name: First step timestamp
        run: date -u +"first-step-utc=%Y-%m-%dT%H:%M:%SZ"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Mount pnpm cache disk
        uses: depot/cache-mount@v1
        with:
          name: iterate-preview-pnpm-store
          path: /mnt/cache/pnpm-store
          write-lock: /mnt/cache/pnpm-store

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: |-
          set -euo pipefail
          npm install --global pnpm@10.24.0
          pnpm config set store-dir "$PNPM_CONFIG_STORE_DIR"
          node --version
          pnpm --version
          echo "pnpm-store=$(pnpm store path)"
          du -sh "$(pnpm store path)" || true

      - name: Install dependencies
        run: pnpm install

      - name: Report dependency cache size
        run: |-
          set -euo pipefail
          echo "pnpm-store=$(pnpm store path)"
          du -sh "$(pnpm store path)" || true
          du -sh node_modules || true
