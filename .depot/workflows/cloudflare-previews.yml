name: Cloudflare Previews Depot Trial

on:
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to update
        required: true
        type: string
      pull_request_head_sha:
        description: Pull request head SHA to deploy
        required: true
        type: string
      pull_request_head_ref_name:
        description: Pull request head branch name
        required: true
        type: string
      pull_request_base_sha:
        description: Pull request base SHA for affected-app detection
        required: true
        type: string
      repository_full_name:
        description: GitHub repository full name
        required: false
        default: iterate/iterate
        type: string

permissions:
  contents: read
  pull-requests: write

env:
  PNPM_CONFIG_STORE_DIR: /mnt/cache/pnpm-store

jobs:
  preview:
    name: Preview / deploy + e2e
    runs-on:
      size: 16x64
      image: 0p91s0lz49.registry.depot.dev/iterate-preview-ci:node24-pnpm10-worktree
    concurrency:
      group: cloudflare-preview-lifecycle-${{ inputs.pull_request_number }}
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false
          ref: ${{ inputs.pull_request_head_sha }}

      - name: Mount pnpm cache disk
        uses: depot/cache-mount@v1
        with:
          name: iterate-preview-pnpm-store
          path: /mnt/cache/pnpm-store
          write-lock: /mnt/cache/pnpm-store

      - name: Validate baked dependency tree
        run: |-
          set -euo pipefail
          node --version
          pnpm --version
          doppler --version
          pnpm install

      - name: Preview / deploy
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.ITERATE_BOT_GITHUB_TOKEN || github.token }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |-
          set -euo pipefail
          doppler run --project _shared --config prd -- pnpm preview deploy \
            --github-token "$GITHUB_TOKEN" \
            --pull-request-head-ref-name "${{ inputs.pull_request_head_ref_name }}" \
            --pull-request-head-sha "${{ inputs.pull_request_head_sha }}" \
            --pull-request-base-sha "${{ inputs.pull_request_base_sha }}" \
            --pull-request-number "${{ inputs.pull_request_number }}" \
            --repository-full-name "${{ inputs.repository_full_name }}" \
            --is-fork "false" \
            --workflow-run-url "$WORKFLOW_RUN_URL"

      - name: Preview / e2e
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.ITERATE_BOT_GITHUB_TOKEN || github.token }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |-
          set -euo pipefail
          doppler run --project _shared --config prd -- pnpm preview test \
            --github-token "$GITHUB_TOKEN" \
            --pull-request-head-sha "${{ inputs.pull_request_head_sha }}" \
            --pull-request-number "${{ inputs.pull_request_number }}" \
            --repository-full-name "${{ inputs.repository_full_name }}" \
            --workflow-run-url "$WORKFLOW_RUN_URL"
