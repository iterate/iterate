# Depot CI preview deploy + e2e.
#
# This is the PRIMARY preview workflow: Depot CI picks up jobs in ~7s where
# GitHub Actions runner assignment took 20s-3m39s (measured 2026-07-02), so
# the pull_request triggers live here. The GitHub workflow
# (.github/workflows/cloudflare-previews.yml, generated from ts-workflows)
# keeps only the PR-close cleanup job — cleanup is not latency-sensitive and
# GitHub's `closed` trigger is the reliable place to hear about it. Keep the
# paths below in sync with the generated GitHub workflow's list (source of
# truth: scripts/preview/preview.ts path constants).
#
# Secrets (depot ci secrets --org 0p91s0lz49): DOPPLER_TOKEN,
# ITERATE_BOT_GITHUB_TOKEN.
#
# Manual run against a PR:
#   depot ci dispatch --org 0p91s0lz49 --repo iterate/iterate \
#     --workflow cloudflare-previews.yml --ref <branch> \
#     --input pull-request-number=<pr>

name: Cloudflare Previews (Depot CI)

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - .github/workflows/cloudflare-previews.yml
      - .github/ts-workflows/workflows/cloudflare-previews.ts
      - .depot/workflows/cloudflare-previews.yml
      - packages/shared/**
      - packages/ui/**
      - packages/mock-http-proxy/**
      - scripts/preview/**
      - apps/iterate-com/**
      - apps/auth-example/**
      - apps/os/**
      - apps/auth/**
      - apps/auth-contract/**
      - apps/os/src/domains/streams/**
      - apps/semaphore/**
      - apps/streams-example-app/**
  workflow_dispatch:
    inputs:
      pull-request-number:
        description: PR number to deploy + test
        required: true

concurrency:
  group: cloudflare-previews-${{ github.event.pull_request.number || inputs.pull-request-number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Preview / deploy + e2e
    # 8-core: the job is network-bound (waiting on deployed slots), not
    # CPU-bound. Depot metrics on a full run showed peak CPU ~30% and peak
    # memory ~10% of a 16-core box, so 8 cores keeps peak ~60% with headroom
    # while halving the per-second cost. Re-check with
    # `depot ci metrics --run <id>` before changing.
    runs-on: depot-ubuntu-24.04-8
    concurrency:
      group: cloudflare-preview-lifecycle-${{ github.event.pull_request.number || inputs.pull-request-number }}
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Install Doppler CLI
        run: |-
          for i in 1 2 3; do curl -sfLS https://cli.doppler.com/install.sh | sh -s -- --no-package-manager && break; echo "Attempt $i failed, retrying in 5s..."; sleep 5; done
          doppler --version || { echo 'Failed to install Doppler CLI after 3 attempts'; exit 1; }
      - name: Preview / deploy
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.ITERATE_BOT_GITHUB_TOKEN || github.token }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |-
          set -euo pipefail
          doppler run --project _shared --config prd -- pnpm preview deploy \
            --github-token "$GITHUB_TOKEN" \
            --pull-request-number "${{ github.event.pull_request.number || inputs.pull-request-number }}"
      - name: Preview / e2e
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.ITERATE_BOT_GITHUB_TOKEN || github.token }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |-
          set -euo pipefail
          doppler run --project _shared --config prd -- pnpm preview test \
            --github-token "$GITHUB_TOKEN" \
            --pull-request-number "${{ github.event.pull_request.number || inputs.pull-request-number }}"
      - name: Upload OS preview test artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: preview-os-test-artifacts
          path: |-
            test-results
            apps/os/test-results
            /tmp/os-e2e-*
            /tmp/os-itx-e2e-*
          if-no-files-found: ignore
